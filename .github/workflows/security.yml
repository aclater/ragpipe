name: Security scan

on:
  pull_request:
  schedule:
    # Weekly Monday 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - run: pip install --quiet .
      - uses: pypa/gh-action-pip-audit@v1.1.0

  trivy-container:
    name: Trivy container scan (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # CPU variant only — ROCm image requires GPU hardware to build and
          # takes 20+ min in CI due to ROCm dependency download (~4 GB).
          # Built locally on hardware with GPU access (harrison).
          - variant: cpu
            file: Containerfile
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build container image
        run: docker build -t ragpipe:${{ matrix.variant }} -f ${{ matrix.file }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true  # Non-blocking — findings reported via Security tab
        with:
          image-ref: ragpipe:${{ matrix.variant }}
          format: sarif
          output: trivy-results-${{ matrix.variant }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/owasp-top-ten
        continue-on-error: true

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
